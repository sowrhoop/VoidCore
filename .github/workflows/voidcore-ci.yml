name: Build & Release VoidCore

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  # Secrets are compile-time inputs for voidcore-shared (baked via option_env!).
  CERT_PFX: ${{ secrets.CERT_PFX }}
  CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
  VOIDCORE_PUBKEY: ${{ secrets.PUBLIC_KEY }}
  SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
  APP_WHITELIST: ${{ secrets.APP_WHITELIST }}
  URL_BLOCKLIST: ${{ secrets.URL_BLOCKLIST }}
  TRUSTED_PUBLISHERS: ${{ secrets.TRUSTED_PUBLISHERS }}
  # Faster, cache-friendly release builds on CI runners.
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Calculate dynamic version
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag') {
            $tag = '${{ github.ref_name }}'
            $ver = $tag -replace '^v1\.0\.', ''
            "RELEASE_TAG=$tag" >> $env:GITHUB_ENV
            "VOIDCORE_VERSION=$ver" >> $env:GITHUB_ENV
          } else {
            "RELEASE_TAG=v1.0.${{ github.run_number }}" >> $env:GITHUB_ENV
            "VOIDCORE_VERSION=${{ github.run_number }}" >> $env:GITHUB_ENV
          }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          shared-key: windows-msvc
          cache-all-crates: true
          save-if: ${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}

      - name: Warm Cargo registry
        shell: pwsh
        run: |
          if (Test-Path Cargo.lock) {
            cargo fetch --locked
          } else {
            cargo fetch
          }

      - name: Build core binaries
        shell: pwsh
        run: >-
          cargo build --release
          -p voidcore-shared
          -p voidcore-service
          -p voidcore-gui

      - name: Configure Authenticode signing
        if: env.CERT_PFX != ''
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'voidcore-cert.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:CERT_PFX))
          $signtool = Get-ChildItem -Path 'C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe' |
            Sort-Object -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw 'signtool.exe not found (Windows SDK required).' }
          "CERT_PATH=$certPath" >> $env:GITHUB_ENV
          "SIGNTOOL=$signtool" >> $env:GITHUB_ENV

      - name: Sign core binaries (Authenticode)
        if: env.CERT_PFX != ''
        shell: pwsh
        run: |
          & $env:SIGNTOOL sign /f $env:CERT_PATH /p $env:CERT_PASSWORD `
            /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
            target/release/voidcore-service.exe `
            target/release/voidcore-gui.exe

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/ci-requirements.txt

      - name: Generate Ed25519 signatures
        if: env.SIGNING_KEY != ''
        shell: pwsh
        run: |
          pip install -r scripts/ci-requirements.txt
          python scripts/sign-ed25519.py `
            target/release/voidcore-service.exe `
            target/release/voidcore-gui.exe

      - name: Stage installer payloads
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path tools/installer-builder/payloads | Out-Null
          Copy-Item target/release/voidcore-service.exe tools/installer-builder/payloads/
          Copy-Item target/release/voidcore-gui.exe tools/installer-builder/payloads/

      - name: Build installer
        shell: pwsh
        run: cargo build --release -p installer-builder --features bundled

      - name: Package installer artifact
        shell: pwsh
        run: Move-Item -Force target/release/installer-builder.exe ./VoidCore-Setup.exe

      - name: Sign installer (Authenticode)
        if: env.CERT_PFX != ''
        shell: pwsh
        run: |
          & $env:SIGNTOOL sign /f $env:CERT_PATH /p $env:CERT_PASSWORD `
            /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
            VoidCore-Setup.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            VoidCore-Setup.exe
            target/release/voidcore-service.exe
            target/release/voidcore-service.exe.sig
            target/release/voidcore-gui.exe
            target/release/voidcore-gui.exe.sig
