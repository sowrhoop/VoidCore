name: VoidCore CI/CD & Cryptographic Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build, Sign, and Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc

      - name: Build Workspace
        run: cargo build --workspace --release

      - name: Run Installer Builder (Stage Files)
        run: cargo run --bin installer-builder --release

      - name: Authenticode Sign Binaries
        if: env.CERT_PFX != '' && env.CERT_PASSWORD != ''
        env:
          CERT_PFX: ${{ secrets.CERT_PFX }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          $pfxPath = "$env:TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CERT_PFX))
          # Sign Service and GUI Binaries
          signtool sign /f $pfxPath /p $env:CERT_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 target\release\voidcore-service.exe
          signtool sign /f $pfxPath /p $env:CERT_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 target\release\voidcore-gui.exe
          Remove-Item $pfxPath

      - name: Package Staged Release
        run: Compress-Archive -Path dist\voidcore_staging\* -DestinationPath voidcore-release.zip

      - name: Generate Ed25519 Cryptographic Signature
        if: env.SIGNING_KEY != ''
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          python -c "
          import os, binascii
          from cryptography.hazmat.primitives.asymmetric import ed25519
          key_hex = os.environ.get('SIGNING_KEY', '')
          if key_hex:
              priv_key = ed25519.Ed25519PrivateKey.from_private_bytes(binascii.unhexlify(key_hex))
              # Sign the main service executable for the auto-updater
              with open(r'target\release\voidcore-service.exe', 'rb') as f:
                  data = f.read()
              signature = priv_key.sign(data)
              with open(r'target\release\voidcore-service.exe.sig', 'wb') as f:
                  f.write(signature)
          "

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            voidcore-release.zip
            target/release/voidcore-service.exe
            target/release/voidcore-service.exe.sig