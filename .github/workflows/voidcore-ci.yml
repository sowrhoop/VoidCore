name: Build & Release VoidCore

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # Required to publish GitHub Releases

jobs:
  build-windows:
    runs-on: windows-latest
    
    env:
      CERT_PFX: ${{ secrets.CERT_PFX }}
      CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
      VOIDCORE_PUBKEY: ${{ secrets.PUBLIC_KEY }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc

      - name: Build Core Binaries
        run: cargo build --workspace --release --exclude installer-builder

      - name: Sign Core Binaries (Authenticode)
        if: env.CERT_PFX != ''
        run: |
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:CERT_PFX))
          $signtool = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Sort-Object -Descending | Select-Object -First 1).FullName
          & $signtool sign /f cert.pfx /p $env:CERT_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 target/release/voidcore-service.exe target/release/voidcore-gui.exe

      - name: Generate Ed25519 Cryptographic Signatures
        # This generates the .sig files the daemon's auto-updater relies on
        if: env.SIGNING_KEY != ''
        run: |
          pip install cryptography
          python -c "
          import os, binascii
          from cryptography.hazmat.primitives.asymmetric import ed25519
          
          priv_key = ed25519.Ed25519PrivateKey.from_private_bytes(binascii.unhexlify(os.environ['SIGNING_KEY']))
          for exe in ['target/release/voidcore-service.exe', 'target/release/voidcore-gui.exe']:
              with open(exe, 'rb') as f: data = f.read()
              sig = priv_key.sign(data)
              with open(exe + '.sig', 'wb') as f: f.write(sig)
          "

      - name: Stage Payloads for Installer
        run: |
          New-Item -ItemType Directory -Force -Path tools/installer-builder/payloads
          Copy-Item target/release/voidcore-service.exe tools/installer-builder/payloads/
          Copy-Item target/release/voidcore-gui.exe tools/installer-builder/payloads/

      - name: Build Single EXE Installer
        run: cargo build -p installer-builder --release --features bundled

      - name: Move and Rename Installer Artifact
        run: Move-Item target/release/installer-builder.exe ./VoidCore-Setup.exe

      - name: Sign Installer (Authenticode)
        if: env.CERT_PFX != ''
        run: |
          $signtool = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Sort-Object -Descending | Select-Object -First 1).FullName
          & $signtool sign /f cert.pfx /p $env:CERT_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 VoidCore-Setup.exe

      - name: Publish GitHub Release
        # This officially attaches all files to the Tagged Release so the API can find them
        uses: softprops/action-gh-release@v2
        with:
          files: |
            VoidCore-Setup.exe
            target/release/voidcore-service.exe
            target/release/voidcore-service.exe.sig
            target/release/voidcore-gui.exe
            target/release/voidcore-gui.exe.sig