name: Build & Release VoidCore

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    # Map secrets to job-level environment variables so they can be safely evaluated in 'if' conditions
    env:
      CERT_PFX: ${{ secrets.CERT_PFX }}
      CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
      VOIDCORE_PUBKEY: ${{ secrets.PUBLIC_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc

      - name: Build Core Binaries
        # Compile everything except the installer first
        run: cargo build --workspace --release --exclude installer-builder

      - name: Sign Core Binaries
        # Now we evaluate against the 'env' context instead of the 'secrets' context
        if: env.CERT_PFX != ''
        run: |
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:CERT_PFX))
          $signtool = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Sort-Object -Descending | Select-Object -First 1).FullName
          & $signtool sign /f cert.pfx /p $env:CERT_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 target/release/voidcore-service.exe target/release/voidcore-gui.exe

      - name: Stage Payloads for Installer
        # Copy compiled artifacts into the installer's view before building it
        run: |
          New-Item -ItemType Directory -Force -Path tools/installer-builder/payloads
          Copy-Item target/release/voidcore-service.exe tools/installer-builder/payloads/
          Copy-Item target/release/voidcore-gui.exe tools/installer-builder/payloads/

      - name: Build Single EXE Installer
        # VOIDCORE_PUBKEY is already mapped in the job-level env, so option_env!() in Rust will find it
        run: cargo build -p installer-builder --release --features bundled

      - name: Rename Installer Artifact
        run: Rename-Item target/release/installer-builder.exe VoidCore-Setup.exe

      - name: Sign Installer
        if: env.CERT_PFX != ''
        run: |
          $signtool = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Sort-Object -Descending | Select-Object -First 1).FullName
          & $signtool sign /f cert.pfx /p $env:CERT_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 VoidCore-Setup.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoidCore-Setup
          path: VoidCore-Setup.exe