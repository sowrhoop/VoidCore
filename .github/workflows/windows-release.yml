name: VoidCore Cryptographic Release

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'build.rs'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (stable, MSVC target)
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc

      # Cache Cargo registry + build artifacts to keep CI fast
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Monotonic version code: 100000 + run_number avoids padding issues
      - name: Generate release tag
        id: tag
        shell: pwsh
        run: |
          $VERSION_CODE = 100000 + ${{ github.run_number }}
          $TAG_NAME     = "v1.0.$VERSION_CODE"
          echo "VERSION_CODE=$VERSION_CODE" >> $env:GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME"         >> $env:GITHUB_ENV
          Write-Host "Release tag: $TAG_NAME"

      - name: Build release binary (secrets baked in at compile time)
        env:
          APP_WHITELIST: ${{ secrets.APP_WHITELIST }}
          URL_BLOCKLIST: ${{ secrets.URL_BLOCKLIST }}
          PUBLIC_KEY:    ${{ secrets.PUBLIC_KEY }}
          GITHUB_REPO:   ${{ github.repository }}
          VERSION_CODE:  ${{ env.VERSION_CODE }}
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Set up Python for signing
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install signing dependency
        run: pip install cryptography

      - name: Sign binary with Ed25519 private key
        shell: python
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          import os, sys
          from cryptography.hazmat.primitives.asymmetric import ed25519

          key_hex = os.environ['SIGNING_KEY']
          if len(key_hex) != 64:
              print(f"[FATAL] SIGNING_KEY must be 64 hex chars (32 bytes), got {len(key_hex)}", file=sys.stderr)
              sys.exit(1)

          private_key = ed25519.Ed25519PrivateKey.from_private_bytes(bytes.fromhex(key_hex))

          exe_path = r'target\x86_64-pc-windows-msvc\release\voidcore.exe'
          with open(exe_path, 'rb') as f:
              exe_data = f.read()

          signature = private_key.sign(exe_data)
          print(f"[INFO] Binary size : {len(exe_data):,} bytes")
          print(f"[INFO] Signature   : {signature.hex()[:32]}…")

          sig_path = exe_path + '.sig'
          with open(sig_path, 'wb') as f:
              f.write(signature)

          print("[SUCCESS] Binary signed — release is cryptographically verified.")

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ env.TAG_NAME }}
          name:       "VoidCore ${{ env.TAG_NAME }}"
          body: |
            ## 🔒 VoidCore Cryptographic Release

            **Version Code:** `${{ env.VERSION_CODE }}`
            **Commit:** `${{ github.sha }}`

            This binary is Ed25519-signed and anti-rollback enforced.
            The daemon will auto-detect and apply this update within one hour.

            ### Manual update
            ```
            voidcore --update
            ```
          files: |
            target/x86_64-pc-windows-msvc/release/voidcore.exe
            target/x86_64-pc-windows-msvc/release/voidcore.exe.sig
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: false
